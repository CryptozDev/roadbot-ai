version: "3.9"

services:
  mysql:
    image: mysql:8.4
    container_name: roadbot-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: roadbot
      MYSQL_DATABASE: roadbot_ai
      MYSQL_USER: roadbot
      MYSQL_PASSWORD: roadbot
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proadbot"]
      interval: 10s
      timeout: 5s
      retries: 10

  phpmyadmin:
    image: phpmyadmin:5.2-apache
    container_name: roadbot-phpmyadmin
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_ARBITRARY: 0
    ports:
      - "8080:80"

volumes:
  mysql_data:
